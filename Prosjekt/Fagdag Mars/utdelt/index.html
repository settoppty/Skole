<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="stil.css" />
  </head>
  <body>
    <!-- =============================================
       Oppgave 1 del 1 – Fyll inn navigasjonsmenyen
       Legg til tre lenker inne i <ul>-en:
       "Hjem", "Legg til pokémon" og "Om"
       Bruk riktige HTML-elementer (<li> og <a>)
       ============================================= -->
    <nav>
      <div class="nav-logo">⚡ Pokédex</div>
      <ul class="nav-lenker">
        <li><a href="Prosjekt/Fagdag Mars/utdelt/index.html">Hjem</a></li>
        <li><a href="">Legg til pokémon</a></li>
        <!-- kan man legge til slik at det scroller til knappen? Ja, men jeg husker ikke hvordan -->
        <li><a href="">Om</a></li>
      </ul>
    </nav>
    <!-- Slutt på Oppgave 1 del 1 -->

    <main>
      <section class="statistikk">
        <div class="statistikk-kort">
          <span class="etikett">Antall pokémon</span>
          <span class="verdi" id="antall-pokemon">6</span>
        </div>
        <div class="statistikk-kort">
          <span class="etikett">Level-spenn</span>
          <span class="verdi" id="spenn">38</span>
        </div>
      </section>

      <section class="sortering-seksjon">
        <button id="sorter-navn">Navn</button>
        <button id="sorter-type">Type</button>
        <button id="sorter-level">Level</button>
      </section>

      <section class="legg-til-seksjon">
        <h2>Legg til pokémon</h2>
        <div id="legg-til-skjema">
          <input type="text" id="input-navn" placeholder="Navn" required />
          <select id="input-type" required>
            <option value="Fire">Fire</option>
            <option value="Electric">Electric</option>
            <option value="Grass">Grass</option>
            <option value="Ghost">Ghost</option>
            <option value="Normal">Normal</option>
          </select>
          <input
            type="number"
            id="input-level"
            placeholder="Level (1-100)"
            min="1"
            max="100"
            required
          />
          <button id="legg-til">Legg til</button>
        </div>
      </section>

      <div id="pokemon-liste">
        <!-- Pokémon-kort settes inn av JavaScript -->
      </div>
    </main>

    <!-- =============================================
       Oppgave 1 del 2 – Fyll inn footer
       Legg til ditt eget navn og årstall her
       ============================================= -->
    <footer>Afshin Ahmadi 2026 Copyright</footer>
    <!-- Slutt på Oppgave 1 del 2 -->

    <script src="skript.js"></script>
  </body>
</html>
